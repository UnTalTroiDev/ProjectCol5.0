version: "3.9"

# ---------------------------------------------------------------------------
# MedCity Dashboard — local development stack
#
# Usage:
#   cp .env.example .env   # fill in your values
#   docker compose up --build
#
# Services:
#   backend  → http://localhost:8000
#   frontend → http://localhost:5173
# ---------------------------------------------------------------------------

networks:
  medcity:
    driver: bridge

volumes:
  # Persistent storage for the SQLite stale cache DB.
  # Survives container restarts — MEData CSVs are not re-downloaded on every boot.
  stale_cache_data:

services:

  # --------------------------------------------------------------------------
  # Backend — FastAPI / uvicorn
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount source so code changes are reflected without a rebuild.
      - ./backend:/app
      # Named volume for SQLite stale cache — persists across container restarts.
      - stale_cache_data:/app/data
    env_file:
      - .env
    environment:
      # Override / set defaults here; values in .env take precedence.
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}"
      STALE_CACHE_DB: "${STALE_CACHE_DB:-/app/data/medata_stale.sqlite3}"
      # WhatsApp newsletter
      WHATSAPP_ACCESS_TOKEN: "${WHATSAPP_ACCESS_TOKEN:-}"
      WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID:-}"
      WHATSAPP_DB: "${WHATSAPP_DB:-/app/data/whatsapp_subscribers.sqlite3}"
      WHATSAPP_RATE_LIMIT_PER_MINUTE: "${WHATSAPP_RATE_LIMIT_PER_MINUTE:-30}"
      NEWSLETTER_ENABLED: "${NEWSLETTER_ENABLED:-false}"
      NEWSLETTER_SCHEDULE_HOUR: "${NEWSLETTER_SCHEDULE_HOUR:-8}"
      NEWSLETTER_TIMEZONE: "${NEWSLETTER_TIMEZONE:-America/Bogota}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
    networks:
      - medcity
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Frontend — nginx serving production build
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:8000}"
    ports:
      - "5173:80"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - medcity
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
