version: "3.9"

# ---------------------------------------------------------------------------
# MedCity Dashboard — local development stack
#
# Usage:
#   cp .env.example .env   # fill in your values
#   docker compose up --build
#
# Services:
#   backend  → http://localhost:8000
#   frontend → http://localhost:5173
# ---------------------------------------------------------------------------

networks:
  medcity:
    driver: bridge

services:

  # --------------------------------------------------------------------------
  # Backend — FastAPI / uvicorn
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount source so code changes are reflected without a rebuild.
      - ./backend:/app
    env_file:
      - .env
    environment:
      # Override / set defaults here; values in .env take precedence.
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}"
    networks:
      - medcity
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Frontend — Vite / React
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount source for HMR; node_modules lives inside the container.
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:8000}"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - medcity
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:5173', r => process.exit(r.statusCode < 500 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
